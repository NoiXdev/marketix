name: Bug report
description: Report a problem with marketix
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. **Do not** use this template for security
        vulnerabilities — see [SECURITY.md](../blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: marketix version
      description: Release tag or commit SHA (e.g. v0.1.0 or 6f330bc).
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: How are you running it?
      options:
        - Docker (official image)
        - Self-built from source
        - DDEV (local dev)
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Trimmed log output, stack traces, or browser console errors.
      render: shell
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, related issues, environment quirks, etc.
