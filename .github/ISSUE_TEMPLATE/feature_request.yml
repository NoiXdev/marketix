name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case before the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, or workarounds you use today.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links to related discussions, mockups, etc.
