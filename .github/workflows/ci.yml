name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Pint (code style)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: "8.4"
          tools: composer:v2
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci --no-audit --no-fund

      - name: Build frontend assets
        # composer install runs `artisan package:discover` in post-autoload-dump,
        # which boots Filament's panel provider and resolves Vite::asset() — that
        # requires public/build/manifest.json to exist before composer install.
        run: npm run build

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run Pint
        run: vendor/bin/pint --test --format=txt

  test:
    name: PHPUnit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: "8.4"
          extensions: bcmath, exif, gd, intl, opcache, pcntl, pdo_sqlite, redis, zip
          tools: composer:v2
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci --no-audit --no-fund

      - name: Build frontend assets
        # composer install runs `artisan package:discover` in post-autoload-dump,
        # which boots Filament's panel provider and resolves Vite::asset() — that
        # requires public/build/manifest.json to exist before composer install.
        run: npm run build

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Copy .env.example
        run: cp .env.example .env

      - name: Generate APP_KEY
        run: php artisan key:generate

      - name: Run PHPUnit
        run: php artisan test --compact

  docker:
    name: Docker build (no push)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build image (no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: false
          load: true
          tags: marketix:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        # Pinned to SHA, not tag — CVE-2026-33634 was a tag-hijacking attack
        # against this exact action. Bump by replacing the SHA, not the tag.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: marketix:ci
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1
          format: table
