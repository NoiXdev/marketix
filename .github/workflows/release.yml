name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: "Mark as a pre-release (skips :latest and major/minor Docker tags)"
        type: boolean
        default: false
      dry_run:
        description: "Run all steps but skip pushes (no Docker push, no commit, no tag, no release)"
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Release ${{ inputs.bump }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Docker Hub configuration
        run: |
          : "${DOCKERHUB_NAMESPACE:?Variable DOCKERHUB_NAMESPACE is not set}"
          : "${DOCKERHUB_IMAGE:?Variable DOCKERHUB_IMAGE is not set}"
          : "${DOCKERHUB_USERNAME:?Secret DOCKERHUB_USERNAME is not set}"
          : "${DOCKERHUB_TOKEN:?Secret DOCKERHUB_TOKEN is not set}"
        env:
          DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
          DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_IMAGE }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute next version
        id: bump
        run: |
          current=$(node -p "require('./package.json').version")
          IFS='.' read -r major minor patch <<< "$current"
          case "${{ inputs.bump }}" in
            major) next="$((major+1)).0.0" ;;
            minor) next="${major}.$((minor+1)).0" ;;
            patch) next="${major}.${minor}.$((patch+1))" ;;
            *) echo "::error::Unknown bump type '${{ inputs.bump }}'"; exit 1 ;;
          esac
          tag="v${next}"
          {
            echo "current=${current}"
            echo "next=${next}"
            echo "tag=${tag}"
          } >> "$GITHUB_OUTPUT"
          echo "::notice::Bumping ${current} -> ${next} (${tag})"

      - name: Ensure tag does not already exist
        run: |
          if git rev-parse "refs/tags/${{ steps.bump.outputs.tag }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ steps.bump.outputs.tag }} already exists. Pick a different bump."
            exit 1
          fi

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: "8.4"
          extensions: bcmath, exif, gd, intl, opcache, pcntl, pdo_sqlite, redis, zip
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm

      - name: Build frontend assets
        run: |
          npm ci --no-audit --no-fund
          # Authoritative version bump: the "Compute next version" step is the
          # single source of truth. Write it into package.json/package-lock.json
          # BEFORE building so any build-time embedded version matches the tag.
          # The changelog step below is changelog-text-only and must NOT bump.
          npm version "${{ steps.bump.outputs.next }}" --no-git-tag-version --allow-same-version
          npm run build

      - name: Install Composer production deps
        run: |
          composer install --no-dev --prefer-dist --no-interaction --no-progress --optimize-autoloader

      - name: Generate CHANGELOG.md
        id: changelog
        uses: TriPSs/conventional-changelog-action@ee43def3241429afddab215ba89090cbf64fb45c # v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # NOTE: this action has no `release-as` input (it was silently ignored
          # and the action fell back to its own git-derived version, causing the
          # package.json <-> tag drift). The version is now owned by the npm
          # version step above; here we only generate changelog text.
          preset: conventionalcommits
          tag-prefix: "v"
          output-file: CHANGELOG.md
          release-count: 0
          skip-commit: "true"
          skip-tag: "true"
          skip-bump: "true"
          skip-version-file: "true"
          skip-on-empty: "false"

      - name: Verify version is in sync
        run: |
          pkg=$(node -p "require('./package.json').version")
          want="${{ steps.bump.outputs.next }}"
          if [ "$pkg" != "$want" ]; then
            echo "::error::package.json version ($pkg) does not match the release version ($want). Aborting to prevent version drift."
            exit 1
          fi
          echo "package.json version is $pkg — in sync with tag ${{ steps.bump.outputs.tag }}"

      - name: Build deployment bundle
        id: bundle
        run: |
          tag="${{ steps.bump.outputs.tag }}"
          name="marketix-${tag}"
          stage="/tmp/${name}"
          mkdir -p "$stage"

          # Copy the working tree (which now has the bumped package.json and
          # regenerated CHANGELOG.md), minus dev-only and gitignored cruft.
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.idea' \
            --exclude='.vscode' \
            --exclude='.fleet' \
            --exclude='.nova' \
            --exclude='.zed' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='docs' \
            --exclude='CLAUDE.md' \
            --exclude='.env' \
            --exclude='.env.backup' \
            --exclude='.env.production' \
            --exclude='*.sql' \
            --exclude='*.sql.gz' \
            --exclude='storage/logs/*' \
            --exclude='storage/framework/cache/data/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/views/*' \
            --exclude='frankenphp' \
            --exclude='frankenphp-worker.php' \
            --exclude='.phpunit.result.cache' \
            --exclude='.phpunit.cache' \
            --exclude='.phpactor.json' \
            ./ "$stage/"

          ( cd /tmp && zip -rq "${name}.zip" "${name}" )
          echo "path=/tmp/${name}.zip" >> "$GITHUB_OUTPUT"
          echo "name=${name}.zip" >> "$GITHUB_OUTPUT"
          ls -lh "/tmp/${name}.zip"

      - name: Upload bundle as workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.bundle.outputs.name }}
          path: ${{ steps.bundle.outputs.path }}
          retention-days: 14

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to Docker Hub
        if: ${{ inputs.dry_run == false }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: docker.io/${{ vars.DOCKERHUB_NAMESPACE }}/${{ vars.DOCKERHUB_IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ inputs.prerelease == false }}
            type=semver,pattern={{version}},value=${{ steps.bump.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.bump.outputs.tag }},enable=${{ inputs.prerelease == false }}
            type=semver,pattern={{major}},value=${{ steps.bump.outputs.tag }},enable=${{ inputs.prerelease == false }}
          labels: |
            org.opencontainers.image.title=marketix
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.bump.outputs.next }}
            org.opencontainers.image.licenses=MIT

      - name: Build & push image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          platforms: linux/amd64
          push: ${{ inputs.dry_run == false }}
          provenance: mode=max
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Commit version bump + CHANGELOG to main
        if: ${{ inputs.dry_run == false }}
        env:
          GIT_AUTHOR_NAME: noix-dev-bot
          GIT_AUTHOR_EMAIL: noix-dev-bot@noix.dev
          GIT_COMMITTER_NAME: noix-dev-bot
          GIT_COMMITTER_EMAIL: noix-dev-bot@noix.dev
        run: |
          git add CHANGELOG.md package.json package-lock.json
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "chore(release): ${{ steps.bump.outputs.tag }} [skip ci]"
            git push origin HEAD:main
          fi

      - name: Tag release
        if: ${{ inputs.dry_run == false }}
        env:
          GIT_AUTHOR_NAME: noix-dev-bot
          GIT_AUTHOR_EMAIL: noix-dev-bot@noix.dev
          GIT_COMMITTER_NAME: noix-dev-bot
          GIT_COMMITTER_EMAIL: noix-dev-bot@noix.dev
        run: |
          git tag -a "${{ steps.bump.outputs.tag }}" -m "${{ steps.bump.outputs.tag }}"
          git push origin "${{ steps.bump.outputs.tag }}"

      - name: Create GitHub Release
        if: ${{ inputs.dry_run == false }}
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ steps.bump.outputs.tag }}
          name: ${{ steps.bump.outputs.tag }}
          body: ${{ steps.changelog.outputs.clean_changelog }}
          prerelease: ${{ inputs.prerelease }}
          files: ${{ steps.bundle.outputs.path }}

      - name: Summary
        run: |
          {
            echo "### Release ${{ steps.bump.outputs.tag }}"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Previous version | \`${{ steps.bump.outputs.current }}\` |"
            echo "| New version | \`${{ steps.bump.outputs.next }}\` |"
            echo "| Bump type | \`${{ inputs.bump }}\` |"
            echo "| Pre-release | \`${{ inputs.prerelease }}\` |"
            echo "| Dry run | \`${{ inputs.dry_run }}\` |"
            echo "| Bundle | \`${{ steps.bundle.outputs.name }}\` |"
            echo ""
            echo "**Docker tags:**"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
